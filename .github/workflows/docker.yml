name: Build & Push Commerce API Image

on:
  push:
    branches: [main]
    paths:
      - apps/commerce/**
      - packages/contracts/**
      - packages/types/**
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/commerce/Dockerfile
          push: true
          tags: marfauer2026/wsp-commerce-api:latest

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger Railway redeploy
        run: railway redeploy --service commerce-api --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 16150905-95f0-4e63-90a5-9caa0ff6566f
          RAILWAY_SERVICE_ID: f99ad58f-1c99-446c-97e7-0e5831eb73f2
