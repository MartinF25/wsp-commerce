name: Build & Push Commerce API Image

on:
  push:
    branches: [main]
    paths:
      - apps/commerce/**
      - packages/contracts/**
      - packages/types/**
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/commerce/Dockerfile
          push: true
          tags: marfauer2026/wsp-commerce-api:latest

      - name: Trigger Railway redeploy
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation{serviceInstanceRedeploy(serviceId:\"f99ad58f-1c99-446c-97e7-0e5831eb73f2\",environmentId:\"ca453501-04bd-4d01-b67a-2a034e189cf1\")}"}'
