name: Build & Push Commerce API Image

on:
  push:
    branches: [main]
    paths:
      - apps/commerce/**
      - packages/contracts/**
      - packages/types/**
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/commerce/Dockerfile
          push: true
          tags: marfauer2026/wsp-commerce-api:latest
